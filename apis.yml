description: >-
  Orbital is a data gateway and integration platform that connects APIs, databases,
  event streams, and other data sources without requiring glue code or manual integration
  maintenance. The platform delivers self-repairing integrations through instant,
  on-the-fly orchestration that automatically adapts as APIs and schemas evolve, eliminating
  the need to write resolvers, generate API clients, or maintain YAML mapping files.
